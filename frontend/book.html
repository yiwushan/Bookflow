<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#e45b2f">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BookFlow">
  <title>BookFlow Book Mosaic</title>
  <link rel="manifest" href="/app/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/app/icons/icon-192.png">
  <link rel="stylesheet" href="/app/styles.css">
</head>
<body>
  <main class="page stack">
    <section class="panel topbar">
      <div class="row spread">
        <div>
          <h1>书籍拼图</h1>
          <p class="page-subtitle">已完成的小节点亮，未读保持灰色，帮助你看见阅读进度。</p>
        </div>
        <div class="row">
          <a id="backLink" class="btn subtle link" href="/app/">返回上页</a>
          <button id="installBtn" class="btn subtle install-btn" type="button" hidden>安装应用</button>
          <button id="logoutBtn" class="btn subtle" type="button">退出登录</button>
        </div>
      </div>

      <div class="row">
        <input id="tokenInput" type="hidden">
        <input id="userInput" type="hidden">
        <span id="currentUserLabel" class="hint"></span>
        <button id="refreshBtn" class="btn primary" type="button">刷新拼图</button>
      </div>

      <div class="row hint">
        <span>book_id:</span>
        <code id="bookIdEcho"></code>
      </div>

      <div id="notice" class="notice">准备加载拼图...</div>
    </section>

    <section id="bookPanel" class="panel reader-card" hidden>
      <h2 id="bookTitle" class="reader-title"></h2>
      <div class="mosaic-summary">
        <div id="summaryLine" class="hint"></div>
        <div class="progress-bar"><span id="progressFill" style="width:0%"></span></div>
      </div>
      <div id="grid" class="mosaic-grid"></div>
    </section>
  </main>

  <script src="/app/app.js"></script>
  <script>
    (() => {
      const App = window.BookFlowApp;
      if (typeof App.initPwa === "function") {
        App.initPwa({ installButtonId: "installBtn" });
      }
      if (typeof App.isLoggedIn === "function" && !App.isLoggedIn()) {
        const next = encodeURIComponent(`${window.location.pathname}${window.location.search || ""}`);
        window.location.href = `/app/login.html?next=${next}`;
        return;
      }
      const query = App.parseQuery();

      const state = {
        token: App.getStoredToken(),
        userId: query.user_id || App.getStoredUserId(),
        bookId: query.book_id || "",
      };

      const tokenInput = document.getElementById("tokenInput");
      const userInput = document.getElementById("userInput");
      const currentUserLabel = document.getElementById("currentUserLabel");
      const refreshBtn = document.getElementById("refreshBtn");
      const backLink = document.getElementById("backLink");
      const logoutBtn = document.getElementById("logoutBtn");
      const bookIdEcho = document.getElementById("bookIdEcho");
      const noticeEl = document.getElementById("notice");
      const bookPanel = document.getElementById("bookPanel");
      const bookTitleEl = document.getElementById("bookTitle");
      const summaryLine = document.getElementById("summaryLine");
      const progressFill = document.getElementById("progressFill");
      const gridEl = document.getElementById("grid");

      tokenInput.value = state.token;
      userInput.value = state.userId || "";
      if (currentUserLabel instanceof HTMLElement) {
        const username = typeof App.getStoredUsername === "function" ? App.getStoredUsername() : "";
        currentUserLabel.textContent = username
          ? `当前用户：${username}`
          : (state.userId ? `当前用户：${state.userId.slice(0, 8)}` : "未登录");
      }
      bookIdEcho.textContent = state.bookId || "(missing)";
      if (typeof App.showFlashToast === "function") {
        App.showFlashToast();
      }

      function setNotice(text, isError = false) {
        noticeEl.className = isError ? "notice error" : "notice";
        noticeEl.textContent = text;
      }

      function navigateBack(defaultHref = "/app/") {
        const currentHref = window.location.href;
        if (window.history.length > 1) {
          window.history.back();
          window.setTimeout(() => {
            if (window.location.href === currentHref) {
              window.location.href = defaultHref;
            }
          }, 180);
          return;
        }
        window.location.href = defaultHref;
      }

      function refreshBackLinkHint() {
        const ref = String(document.referrer || "");
        const sameOrigin = ref.startsWith(window.location.origin);
        if (!sameOrigin) {
          backLink.textContent = "返回 Feed";
          return;
        }
        try {
          const refUrl = new URL(ref);
          if (refUrl.pathname === "/app/reader") {
            backLink.textContent = "返回阅读";
            return;
          }
          if (refUrl.pathname === "/app" || refUrl.pathname === "/app/" || refUrl.pathname === "/" || refUrl.pathname === "/app/feed") {
            backLink.textContent = "返回 Feed";
            return;
          }
        } catch (err) {
          void err;
        }
        backLink.textContent = "返回上页";
      }

      function updateUrl() {
        const params = new URLSearchParams();
        params.set("book_id", state.bookId || "");
        if (state.userId) {
          params.set("user_id", state.userId);
        }
        window.history.replaceState({}, "", `/app/book?${params.toString()}`);
      }

      function makeReaderUrl(chunkId) {
        const params = new URLSearchParams();
        params.set("book_id", state.bookId || "");
        params.set("chunk_id", chunkId || "");
        if (state.userId) {
          params.set("user_id", state.userId);
        }
        return `/app/reader?${params.toString()}`;
      }

      async function loadMosaic() {
        if (!state.bookId) {
          setNotice("缺少 book_id，请从 Feed 点击书名进入。", true);
          return;
        }
        setNotice("正在加载拼图...", false);
        try {
          const params = new URLSearchParams();
          params.set("book_id", state.bookId);
          params.set("compact", "1");
          if (state.userId) {
            params.set("user_id", state.userId);
          }

          const payload = await App.apiFetch(`/v1/book_mosaic?${params.toString()}`, { token: state.token });
          const summary = payload.summary || {};
          const total = Number(summary.total_chunks || 0);
          const read = Number(summary.read_chunks || 0);
          const archived = Math.max(0, Number(summary.archived_chunks || 0));
          const visible = Math.max(0, Number(summary.visible_chunks ?? (total - archived)));
          const rate = total > 0 ? Math.round((read / total) * 1000) / 10 : 0;

          bookTitleEl.textContent = payload.book_title || "未知书籍";
          summaryLine.textContent = `已完成 ${read}/${total} 小节 · 完成率 ${rate}% · 已归档 ${archived} · Feed可见 ${visible}`;
          progressFill.style.width = `${Math.max(0, Math.min(100, rate))}%`;

          const tiles = Array.isArray(payload.tiles) ? payload.tiles : [];
          gridEl.innerHTML = tiles.map((tile) => {
            const stateClass = tile.state === "read" ? "read" : "unread";
            const archiveActive = !!tile.archive_active || String(tile.feed_state || "") === "archived";
            const archiveClass = archiveActive ? "archived" : "visible";
            const idx = Number(tile.global_index || 0);
            const readEvents = Math.max(0, Number(tile.read_events || 0));
            const title = App.escapeHtml(tile.chunk_title || "(无标题)");
            const section = App.escapeHtml(tile.section_id || "-");
            const href = makeReaderUrl(tile.chunk_id || "");
            const readLabel = stateClass === "read"
              ? `已完成${readEvents > 1 ? ` · ${readEvents}次` : ""}`
              : "未完成";
            const feedLabel = archiveActive ? "Feed：已归档" : "Feed：展示中";
            return `
              <a class="mosaic-tile ${stateClass} ${archiveClass}" href="${href}">
                <h3>#${idx} ${title}</h3>
                <p>${section}</p>
                <div class="mosaic-tile-statuses">
                  <span class="tile-status ${stateClass}">${readLabel}</span>
                  <span class="tile-status ${archiveClass}">${feedLabel}</span>
                </div>
              </a>
            `;
          }).join("");

          if (!tiles.length) {
            gridEl.innerHTML = '<div class="notice">这本书暂时还没有章节切片。</div>';
          }

          bookPanel.hidden = false;
          setNotice("加载完成。", false);
        } catch (err) {
          const msg = err?.payload?.error?.message || err.message || "加载失败";
          setNotice(`加载失败：${msg}`, true);
          bookPanel.hidden = true;
        }
      }

      refreshBtn.addEventListener("click", () => {
        const cfg = App.saveConfig(tokenInput.value, userInput.value);
        state.token = cfg.token;
        state.userId = cfg.userId || App.getStoredUserId();
        userInput.value = state.userId || "";
        updateUrl();
        loadMosaic();
      });
      backLink.addEventListener("click", (evt) => {
        evt.preventDefault();
        navigateBack("/app/");
      });
      if (logoutBtn instanceof HTMLButtonElement) {
        logoutBtn.addEventListener("click", async () => {
          if (typeof App.authLogout === "function") {
            await App.authLogout();
          }
          window.location.href = "/app/login.html";
        });
      }
      window.addEventListener("pageshow", (evt) => {
        if (typeof App.showFlashToast === "function") {
          App.showFlashToast();
        }
        const navEntry = (window.performance && typeof window.performance.getEntriesByType === "function")
          ? window.performance.getEntriesByType("navigation")[0]
          : null;
        const isBackForward = !!evt.persisted || (navEntry && navEntry.type === "back_forward");
        if (!isBackForward) {
          return;
        }
        void loadMosaic();
      });

      refreshBackLinkHint();
      updateUrl();
      loadMosaic();
    })();
  </script>
</body>
</html>
