      async function appendOcrToToc() {
        const text = String(ocrOutput.value || "").trim();
        if (!text) {
          setNotice("OCR结果为空，先执行一次截图OCR。", true);
          return;
        }
        const current = String(tocInput.value || "");
        const existingLines = current.split(/\r?\n/).map((x) => x.trim()).filter((x) => x);
        const incomingLines = text.split(/\r?\n/).map((x) => x.trim()).filter((x) => x);
        const normalize = (x) => String(x || "").replace(/\s+/g, " ").trim().toLowerCase();
        const seen = new Set(existingLines.map(normalize));
        const appended = [];
        let skipped = 0;
        for (const line of incomingLines) {
          const key = normalize(line);
          if (!key) {
            continue;
          }
          if (seen.has(key)) {
            skipped += 1;
            continue;
          }
          seen.add(key);
          appended.push(line);
        }
        if (!appended.length) {
          setNotice(`增量追加完成：新增 0 行，跳过重复 ${skipped} 行。`, false);
          return;
        }
        const merged = existingLines.concat(appended).join("\n");
        tocInput.value = merged;
        setNotice(`增量追加完成：新增 ${appended.length} 行，跳过重复 ${skipped} 行。`, false);
        await previewToc();
      }

      async function convertRomanByOffsetForCurrentText() {
        const tocText = String(tocInput.value || "");
        const ocrText = String(ocrOutput.value || "");
        const offset = getPageOffset();
        let target = "toc";
        let source = tocText;
        if (!source.trim() && ocrText.trim()) {
          target = "ocr";
          source = ocrText;
        }
        if (!source.trim()) {
          setNotice("目录文本为空，先OCR或粘贴目录再执行罗马页换算。", true);
          return;
        }
        const converted = convertRomanPagesByOffset(source, offset);
        if (!converted.converted) {
          setNotice("未检测到可换算的罗马页码。", false);
          return;
        }
        if (target === "toc") {
          tocInput.value = converted.text;
          await previewToc();
        } else {
          ocrOutput.value = converted.text;
        }
        setNotice(
          `罗马页换算完成：转换 ${converted.converted} 条（公式：封面页序号-偏移+1，偏移=${offset}），需人工复核 ${converted.nonPositive} 条。`,
          false,
        );
      }

      });
      tidyOcrBtn.addEventListener("click", () => {
        const current = String(ocrOutput.value || "");
        if (!current.trim()) {
          setNotice("OCR结果为空，先执行OCR后再整理。", true);
          return;
        }
        const tidy = tidyStandalonePageNumbers(current);
        ocrOutput.value = tidy.text;
        setNotice(
          `整理完成：序号并入 ${tidy.mergedSeqCount || 0} 条，页码并入 ${tidy.mergedPageCount || 0} 条，序号待人工 ${tidy.orphanSeqCount || 0} 条，页码待人工 ${tidy.orphanNumberLines || 0} 条。`,
          false,
        );
      });
      convertRomanByOffsetBtn.addEventListener("click", () => {
        void convertRomanByOffsetForCurrentText();
      });
      sortByPageBtn.addEventListener("click", () => {
        void sortByPageForCurrentText();
      });
      selectOcrRegionBtn.addEventListener("click", () => {
        setOcrSelectMode(!state.ocrSelectMode);
      });
      appendOcrBtn.addEventListener("click", () => {
        void appendOcrToToc();
      });
      applyOcrBtn.addEventListener("click", () => {
        void applyOcrToToc();
      });
      previewBtn.addEventListener("click", () => {
        void previewToc();
      });
      tocInput.addEventListener("input", () => {
        scheduleLivePreview();
      });
      pageOffsetInput.addEventListener("input", () => {
        if (String(tocInput.value || "").trim()) {
          scheduleLivePreview();
        }
      });
      totalPagesInput.addEventListener("input", () => {
        if (String(tocInput.value || "").trim()) {
          scheduleLivePreview();
        }
      });
      autoIndentCheck.addEventListener("change", () => {
        state.autoIndent = !!autoIndentCheck.checked;
        if (state.preview) {
          renderPreview(state.preview);
        }
      });
      levelSelectAllBtn.addEventListener("click", () => {
        if (!state.preview || !Array.isArray(state.preview.entries)) {
          return;
        }
        state.selectedLevelRows.clear();
        for (let i = 0; i < state.preview.entries.length; i += 1) {
          state.selectedLevelRows.add(i);
        }
        renderPreview(state.preview);
      });
      levelClearSelectBtn.addEventListener("click", () => {
        state.selectedLevelRows.clear();
        if (state.preview) {
          renderPreview(state.preview);
        } else {
          updateLevelSelectionHint(0);
        }
      });
      saveBtn.addEventListener("click", () => {
        void saveToc();
      });
      approveBtn.addEventListener("click", () => {
        void setReviewStatus("approved");
      });
      pendingReviewBtn.addEventListener("click", () => {
        void setReviewStatus("pending_review");
      });
      writeBackBtn.addEventListener("click", () => {
        void writeBackTocToPdf();
      });
      previewWarnings.addEventListener("change", (evt) => {
        const target = evt.target;
        if (!(target instanceof HTMLInputElement)) {
          return;
        }
        if (target.id === "warnSelectAll") {
          if (target.checked) {
            for (const item of state.warningItems) {
              state.selectedWarnings.add(item.key);
            }
          } else {
            for (const item of state.warningItems) {
              state.selectedWarnings.delete(item.key);
            }
          }
          renderPreview(state.preview);
          return;
        }
        if (target.classList.contains("warn-check")) {
          const key = String(target.dataset.key || "");
          if (!key) {
            return;
          }
          if (target.checked) {
            state.selectedWarnings.add(key);
          } else {
            state.selectedWarnings.delete(key);
          }
        }
      });
      previewWarnings.addEventListener("click", (evt) => {
        const el = evt.target;
        if (!(el instanceof Element)) {
          return;
        }
        const button = el.closest("button[data-action]");
        if (!button) {
          return;
        }
        const action = String(button.dataset.action || "");
        if (action === "clear-selected-warnings") {
          for (const key of state.selectedWarnings) {
            state.hiddenWarnings.add(key);
          }
          state.selectedWarnings.clear();
          renderPreview(state.preview);
          return;
        }
        if (action === "restore-all-warnings") {
          resetWarningState();
          renderPreview(state.preview);
        }
      });
      lineDiagBody.addEventListener("click", (evt) => {
        const target = evt.target;
        if (!(target instanceof Element)) {
          return;
        }
        const row = target.closest("tr[data-raw-line]");
        if (!row) {
          return;
        }
        const rawLineNo = Number(row.getAttribute("data-raw-line") || 0);
        if (!Number.isFinite(rawLineNo) || rawLineNo <= 0) {
          return;
        }
        jumpToTocRawLine(rawLineNo);
      });
      tableBody.addEventListener("click", (evt) => {
        const clickTarget = evt.target;
        if (clickTarget instanceof Element) {
          const deleteBtn = clickTarget.closest("button[data-action='delete-row']");
          if (deleteBtn instanceof HTMLButtonElement) {
            const idx = Number(deleteBtn.dataset.idx || -1);
            removePreviewRow(idx);
            return;
          }
        }
        if (clickTarget instanceof Element && clickTarget.closest("input,textarea,select,button")) {
          return;
        }
        const row = evt.target.closest("tr[data-start-page]");
        if (!row) {
          return;
        }
        const page = Number(row.dataset.startPage || 1);
        void loadPagePreview(page);
      });
      tableBody.addEventListener("change", (evt) => {
        const target = evt.target;
        if (!(target instanceof HTMLInputElement)) {
          return;
        }
        if (!state.preview || !Array.isArray(state.preview.entries)) {
          return;
        }
        if (target.classList.contains("toc-level-range")) {
          const idx = Number(target.dataset.idx || -1);
          if (!Number.isInteger(idx) || idx < 0 || idx >= state.preview.entries.length) {
            return;
          }
          const lv = Math.max(1, Math.min(5, Math.trunc(Number(target.value || 1)) || 1));
          const targets = getLevelRowSelection(idx, state.preview.entries.length);
          applyLevelToRows(targets, lv, { render: true });
          return;
        }
        if (target.classList.contains("level-select-check")) {
          const idx = Number(target.dataset.idx || -1);
          if (!Number.isInteger(idx) || idx < 0 || idx >= state.preview.entries.length) {
            return;
          }
          if (target.checked) {
            state.selectedLevelRows.add(idx);
          } else {
            state.selectedLevelRows.delete(idx);
          }
          renderPreview(state.preview);
          return;
        }
        if (!target.classList.contains("toc-edit")) {
          return;
        }
        const idx = Number(target.dataset.idx || -1);
        if (!Number.isInteger(idx) || idx < 0 || idx >= state.preview.entries.length) {
          return;
        }
        const field = String(target.dataset.field || "");
        const row = state.preview.entries[idx];
        if (!row || typeof row !== "object") {
          return;
        }
        if (field === "title") {
          row.title = String(target.value || "").trim();
          if (!row.title) {
            row.title = "Untitled";
          }
          renderPreview(state.preview);
          return;
        }
      });
      tableBody.addEventListener("input", (evt) => {
        const target = evt.target;
        if (!(target instanceof HTMLInputElement)) {
          return;
        }
        if (!target.classList.contains("toc-level-range")) {
          return;
        }
        if (!state.preview || !Array.isArray(state.preview.entries)) {
          return;
        }
        const idx = Number(target.dataset.idx || -1);
        if (!Number.isInteger(idx) || idx < 0 || idx >= state.preview.entries.length) {
          return;
        }
        const lv = Math.max(1, Math.min(5, Math.trunc(Number(target.value || 1)) || 1));
        const targets = getLevelRowSelection(idx, state.preview.entries.length);
        const touched = applyLevelToRows(targets, lv, { render: false });
        syncLevelRowsInDom(touched, lv);
      });
      pagePreviewImage.addEventListener("mousedown", (evt) => {
        if (!state.ocrSelectMode) {
          return;
        }
        evt.preventDefault();
        const rect = pagePreviewImage.getBoundingClientRect();
        const startX = clamp(evt.clientX - rect.left, 0, rect.width);
        const startY = clamp(evt.clientY - rect.top, 0, rect.height);
        state.ocrDrag = { startX, startY, currentX: startX, currentY: startY };
        state.ocrCrop = null;
        drawSelection({ x: startX, y: startY, w: 1, h: 1 });
      });
      window.addEventListener("mousemove", (evt) => {
        if (!state.ocrSelectMode || !state.ocrDrag) {
          return;
        }
        const rect = pagePreviewImage.getBoundingClientRect();
        const currentX = clamp(evt.clientX - rect.left, 0, rect.width);
        const currentY = clamp(evt.clientY - rect.top, 0, rect.height);
        state.ocrDrag.currentX = currentX;
        state.ocrDrag.currentY = currentY;
        drawSelection(normalizedRect(state.ocrDrag.startX, state.ocrDrag.startY, currentX, currentY));
      });
      window.addEventListener("mouseup", () => {
        if (!state.ocrSelectMode || !state.ocrDrag) {
          return;
        }
        const rect = normalizedRect(
          state.ocrDrag.startX,
          state.ocrDrag.startY,
          state.ocrDrag.currentX,
          state.ocrDrag.currentY,
        );
        state.ocrDrag = null;
        if (rect.w < 6 || rect.h < 6) {
          state.ocrCrop = null;
          ocrSelection.hidden = true;
          return;
        }
        state.ocrCrop = rect;
        drawSelection(rect);
      });
      window.addEventListener("keydown", (evt) => {
        if (evt.key === "Escape" && state.ocrSelectMode) {
          setOcrSelectMode(false);
        }
      });

      updateRetryFailedButton();
      readLlmRetryConfig();
      void loadLlmConfigFromServer();
      loadQueue();
    })();
  </script>
</body>
</html>
